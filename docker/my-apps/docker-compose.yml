services:
  rfid-analyzer:
    image: ghcr.io/martbent/rtl-sdr-uhf-rfid-analyzer:latest
    container_name: rfid-analyzer
    restart: unless-stopped
    ports:
      - "8080:80"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  belegtools:
    image: ghcr.io/martbent/belegtools:latest
    container_name: belegtools
    restart: unless-stopped
    env_file: /volume1/docker/belegtools/.env
    environment:
      - MONGODB_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@belegtools-mongodb:27017
      - MONGODB_DB=${MONGO_DB}
    ports:
      - "3000:80"
    depends_on:
      belegtools-mongodb:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - default
      - belegtools

  belegtools-mongodb:
    image: mongo:4.4
    container_name: belegtools-mongodb
    restart: unless-stopped
    env_file: /volume1/docker/belegtools/.env
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB}
    volumes:
      - belegtools_mongodb_data:/data/db
    networks:
      - belegtools
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${UMAMI_POSTGRES_USER}:${UMAMI_POSTGRES_PASSWORD}@umami-db:5432/${UMAMI_POSTGRES_DB}
      - APP_SECRET=${UMAMI_APP_SECRET}
    env_file: /volume1/docker/belegtools/.env
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - belegtools

  umami-db:
    image: postgres:16-alpine
    container_name: umami-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${UMAMI_POSTGRES_USER}
      - POSTGRES_PASSWORD=${UMAMI_POSTGRES_PASSWORD}
      - POSTGRES_DB=${UMAMI_POSTGRES_DB}
    env_file: /volume1/docker/belegtools/.env
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    networks:
      - belegtools
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UMAMI_POSTGRES_USER} -d ${UMAMI_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    user: "postgres"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/services/homes/MartBent/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  belegtools_mongodb_data:
  umami_db_data:

networks:
  belegtools:
    driver: bridge
